# Render Blueprint — React+FastAPI 단일 Docker 웹 서비스
# 사용법: Render 대시보드 → New → Blueprint → 이 repo 선택 → 아래 시크릿을 입력.
# (sync: false = 값은 대시보드에서 수동 입력, GitHub에 노출 안 됨)
services:
  - type: web
    name: biotech-radar
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter         # $7/월, 항상 켜둠(슬립 없음). 무료로 쓰려면 free로 변경.
    region: singapore     # 한국 사용자 근접 리전
    healthCheckPath: /healthz
    autoDeploy: true      # main 푸시 시 자동 재배포
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_PASSWORD       # 웹 접속 비밀번호(Basic Auth). 반드시 설정.
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: FINVIZ_AUTH_TOKEN
        sync: false
      - key: TOSS_API_KEY
        sync: false
      - key: TOSS_API_SECRET
        sync: false
      # 자동매매 24/7 평가 루프 — 상시 웹 안에서 15분마다 evaluate_all (별도 cron 불필요)
      - key: AUTO_EVAL_ENABLED
        value: "1"
      - key: AUTO_EVAL_MINUTES
        value: "15"
      # 조건 발동 시 텔레그램 알림 발송용 (클라우드에서도 알림 가려면 필요)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
